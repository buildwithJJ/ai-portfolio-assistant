<!DOCTYPE html>
<html>
  <head>
    <title>AI Chatbot</title>
    <style>

      body {
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px ;
        border-radius: 10px;
        font-size: 15px;
        border-width: 1px;

        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        align-items: start;
      }

      .chat-message-text{
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .loading-spinner{
        height:40px;
        margin:-15px;
      }

      .chat-message-user .chat-message-text{
        background-color:#DCF8C6;
      }

      .chat-message-robot .chat-message-text{
        background-color:#eeeeee;
      }
      .chat-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:10px 5px;
      }

      .chat-header h3{
        margin:0;
      }

      .clear-button{
        background-color:#dc3545;
        color:white;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
        font-size:13px;
      }

      .clear-button:hover{
        background-color:#bb2d3b;
      }

      

      .dark-mode{
        background-color:#262728;
        color:white;
      }
      body.dark-mode{
        background-color:#262728;
      }

      .dark-mode .chat-message-robot .chat-message-text{
        background-color:#3c3f43;
        color:white;
      }

      .dark-mode .chat-message-user .chat-message-text{
        background-color:#16a34a;
        color:white;
      }

      .theme-button{
        background:none;
        border:none;
        font-size:18px;
        cursor:pointer;
        margin-right:10px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>


    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
    

    async function getAIResponse(message) {

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer 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"
        },
        body: JSON.stringify({
            model: "llama-3.1-8b-instant",
            messages: [

            {
              role: "system",
              content: "You are a friendly AI assistant on Jonathan Jose Thomas's portfolio website. Keep answers short (2-3 sentences). If someone asks about Jonathan, talk about his skills, projects, and experience as a Computer Science engineer."
            },
            { role: "user", content: message }
            ]
        })
        });

        const data = await response.json();

        console.log("Groq API response:", data);

        if (!response.ok) {
        return "Error: " + data.error.message;
        }

        return data.choices[0].message.content;

    } catch (error) {
        console.error(error);
        return "Failed to contact AI service.";
    }
    }
    
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);
        }


        async function sendMessage() {
          if (!inputText.trim()) return;

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            },
            {
              message: <img src="loading-spinner.gif" className='loading-spinner'/>,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ];

          setChatMessages(newChatMessages);

          const response = await getAIResponse(inputText);

          setTimeout(() => {
          setChatMessages([
            ...newChatMessages.slice(0,-1),
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
          },1000);
          setInputText('');
        }

        function handleKeyDown(event) {
          if (event.key === "Enter"){
            sendMessage();
          }
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              onKeyDown={handleKeyDown}
              value={inputText}
              className="chat-input"
            />
            <button
              onClick={sendMessage}
              className ="send-button"
            >
            Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {

        return (
          <div className={sender === 'user' ? 'chat-message-user' : 'chat-message-robot'}>
            {sender === 'robot' && (
              <img src="robot.png" className="chat-message-profile" />
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === 'user' && (
              <img src="user.png" className="chat-message-profile" />
            )}
          </div>  
        );
      }

      function ChatMessages({ chatMessages }) {

        const chatMessageRef = React.useRef(null);

        React.useEffect(()=>{
          const containerElem = chatMessageRef.current;
          if (containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        },[chatMessages]);
        return (
          <div className="chat-messages-container" ref={chatMessageRef}>
          {chatMessages.length === 0 && (
            <p style={{textAlign: "center", marginTop: "40px"}}>
               Welcome to the chatbot project! Send a message using the textbox below.
            </p>
          )}
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState(() => {
          const savedMessages = localStorage.getItem('chatMessages');
          return savedMessages ? JSON.parse(savedMessages) : [];
        });        
        
        React.useEffect(() => {
          localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
        }, [chatMessages]);

        const [darkMode, setDarkMode] = React.useState(false);

        function toggleDarkMode(){
          const newMode = !darkMode;
          setDarkMode(newMode);

          if(newMode){
            document.body.classList.add("dark-mode");
          } else {
            document.body.classList.remove("dark-mode");
          }
        }

        function clearChat(){
          const confirmDelete = window.confirm("Are you sure you want to delete all chat messages?");

          if (confirmDelete) {
            setChatMessages([]);
            localStorage.removeItem('chatMessages');
          }
        }
        return (
          <div className={`app-container ${darkMode ? "dark-mode" : ""}`}>
            <div className="chat-header">
              <h3>Chatbot</h3>
              <div>
                <button onClick={toggleDarkMode} className="theme-button">
                  {darkMode ? "☀️" : "🌙"}
                </button>
                <button onClick={clearChat} className="clear-button">
                  Clear Chat
                </button>
              </div>
              
            </div>
            <ChatMessages
              chatMessages={chatMessages}
            />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
